name: Terraform Deployment
description: Deploy Dockerized app to EC2 using Terraform

inputs:
  aws-access-key-id:
    description: AWS Access Key ID
    required: true
  aws-secret-access-key:
    description: AWS Secret Access Key
    required: true
  aws-region:
    description: AWS region
    required: false
    default: 'ap-south-1'
  aws-account-id:
    description: AWS account ID
    required: true
  
runs:
  using: composite

  steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform INIT
        run: terraform init
        shell: bash
      
      - name: Terraform Validate
        run: terraform validate
        shell: bash

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        shell: bash

      - name: Terraform Apply
        run: terraform apply --auto-approve tfplan
        shell: bash

      - name: Wait for the instance to start
        run: sleep 90
        shell: bash

      - name: Fetch Public IP
        id: ec2_pub_ip
        run: |
          EC2_PUBLIC_IP=$(terraform output -raw public_ip)
          echo "public_ip=$EC2_PUBLIC_IP" >> $GITHUB_OUTPUT
        shell: bash

      # - name: Health Check App
      #   run: |
      #     echo "Checking app at http://${{steps.ec2_pub_ip.outputs.public_ip}}"
      #     curl -f http://${{steps.ec2_pub_ip.outputs.public_ip}}" || (echo "App not responding" && exit 1)

      - name: Keep App Alive
        run: |
          echo "Running the App"
          sleep 600
        shell: bash
      
      - name: Terraform Destroy
        if: always()
        run: terraform destroy --auto-approve
        shell: bash
 