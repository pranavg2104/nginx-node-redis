name: Deploy Nginx application to ECS and use Fargate to provision the server

on:
    workflow_call

jobs:
    docker-compose:
        runs-on: ubuntu-latest
    
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
            AWS_DEFAULT_REGION: ap-south-1
        
        steps:
            - name: Checkout
              uses: actions/checkout@v3
            
            - name: Setup Docker Compose
              uses: docker/setup-compose-action@v2

            - name: AWS Configure
              run: |
                export AWS_ACCESS_KEY_ID=${{ env.AWS_ACCESS_KEY_ID }}
                export AWS_SECRET_ACCESS_KEY=${{ env.AWS_SECRET_ACCESS_KEY }}
                export AWS_REGION=${{ env.AWS_DEFAULT_REGION }}

            - name: Docker Login
              run: aws ecr get-login-password --region ${{ env.AWS_DEFAULT_REGION }}| docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com

            - name: Docker Compose UP
              run: docker-compose -f compose.yml up -d --build

            - name: Docker push
              run: docker compose push

            
